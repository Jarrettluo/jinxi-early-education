<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice">
  <!-- 绿水池塘 -->
  <rect width="400" height="600" fill="#e8f5e8"/>
  
  <!-- 水波层次 -->
  <ellipse cx="200" cy="500" rx="200" ry="100" fill="#81c784" opacity="0.25"/>
  <ellipse cx="200" cy="550" rx="180" ry="80" fill="#66bb6a" opacity="0.2"/>
  
  <!-- 简单的鹅 (三角形简化) -->
  <g transform="translate(200, 350)">
    <ellipse cx="0" cy="20" rx="50" ry="25" fill="#fff" opacity="0.85"/>
    <circle cx="0" cy="-20" r="18" fill="#fff" opacity="0.9"/>
    <polygon points="15,-20 30,-18 15,-15" fill="#f5a623"/>
    <circle cx="5" cy="-25" r="2.5" fill="#333"/>
  </g>
  
  <!-- 红掌 -->
  <ellipse cx="200" cy="420" rx="30" ry="12" fill="#ef5350" opacity="0.6"/>
  
  <!-- 荷叶 -->
  <circle cx="80" cy="520" r="30" fill="#4caf50" opacity="0.3"/>
  <circle cx="320" cy="500" r="25" fill="#4caf50" opacity="0.25"/>
</svg>