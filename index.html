<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦汐的早教课堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px 15px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .card-desc {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
            .subtitle { font-size: 1rem; margin-bottom: 2rem; }
            .cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .card {
                border-radius: 14px;
                padding: 20px 12px;
            }
            .card-icon { font-size: 2.4rem; margin-bottom: 10px; }
            .card-title { font-size: 1rem; margin-bottom: 6px; }
            .card-desc { font-size: 0.8rem; }
        }

        @media (max-width: 360px) {
            .cards { gap: 10px; }
            .card { padding: 16px 10px; }
            .card-icon { font-size: 2rem; }
            .card-title { font-size: 0.9rem; }
        }

        @media (min-width: 768px) {
            h1 { font-size: 2.2rem; }
            .cards { gap: 25px; }
            .card { padding: 40px 30px; }
            .card-icon { font-size: 3.5rem; }
            .card-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 锦汐的早教课堂</h1>
        <p class="subtitle">选择你喜欢的课程开始学习吧</p>
        
        <div class="cards">
            <a href="child-poetry/" class="card poetry-card">
                <span class="card-icon">🏯</span>
                <h2 class="card-title">诗词歌赋</h2>
                <p class="card-desc">经典唐诗宋词<br>感受中华文化魅力</p>
            </a>

            <a href="chinese-history/" class="card history-card">
                <span class="card-icon">🏺</span>
                <h2 class="card-title">中国历史</h2>
                <p class="card-desc">华夏五千年文明<br>按朝代编年展开</p>
            </a>

            <a href="world-history/" class="card world-card">
                <span class="card-icon">🌍</span>
                <h2 class="card-title">世界历史</h2>
                <p class="card-desc">环球文明之旅<br>探索人类发展</p>
            </a>

            <a href="kids-encyclopedia/" class="card encyclopedia-card">
                <span class="card-icon">🔬</span>
                <h2 class="card-title">少儿百科</h2>
                <p class="card-desc">趣味科学知识<br>探索奇妙世界</p>
            </a>
        </div>
    </div>
</body>
</html>
