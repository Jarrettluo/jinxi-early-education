<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦汐的早教课堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        .card-desc {
            color: #666;
            font-size: 0.95rem;
        }
        .poetry-card .card-icon { color: #e74c3c; }
        .encyclopedia-card .card-icon { color: #3498db; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .cards { gap: 20px; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 锦汐的早教课堂</h1>
        <p class="subtitle">选择你喜欢的课程开始学习吧</p>
        
        <div class="cards">
            <a href="child-poetry/" class="card poetry-card">
                <span class="card-icon">🏯</span>
                <h2 class="card-title">诗词歌赋</h2>
                <p class="card-desc">经典唐诗宋词<br>感受中华文化魅力</p>
            </a>
            
            <a href="kids-encyclopedia/" class="card encyclopedia-card">
                <span class="card-icon">🔬</span>
                <h2 class="card-title">少儿百科</h2>
                <p class="card-desc">趣味科学知识<br>探索奇妙世界</p>
            </a>
        </div>
    </div>
</body>
</html>
